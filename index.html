<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bikewatching</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="global.css" />
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="map.css" />
    <script src="map.js" type="module"></script>
  </head>
  <body>
    <header>
    <div>
    <h1>🚴🏼‍♀️ Bikewatching</h1>
    <h4>An interactive map visualization of bike traffic in the Boston area.</h4>
    </div>
    <div class="filter-controls">
    <div class="filter-row">
    <label for="time-slider">Filter by time:</label>
    <input id="time-slider" type="range" min="-1" max="1440" value="-1" />
    </div>
    <div class="time-row">
    <time id="selected-time"></time>
    <em id="any-time">(any time)</em>
    </div>
    </div>
    </header>
    <div id="map">
      <svg></svg>
    </div>
    <div class="legend">
      <div class="legend-title">Legend:</div>
      <div style="--departure-ratio: 1">More departures</div>
      <div style="--departure-ratio: 0.5">Balanced</div>
      <div style="--departure-ratio: 0">More arrivals</div>
    </div>
  </body>
</html>
